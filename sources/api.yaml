    /{partner}/feedback:
        get:
            summary: Return the feedback for a given partner
            description: Return the feedback for a given partner
            parameters:
                - name: partner
                  in: path
                  required: true
                  description: the identifier of the partner
                  example: "partner1"
                  schema:
                      type: string
                - name: model
                  in: query
                  required: true
                  description: "the identifier of the model file name"
                  example: "model.pkl"
                  schema:
                      type: string
                - name: prediction_target
                  in: query
                  required: false
                  description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                  example: "Biomass"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PartnerFeedbackResponse"
                "404":
                    description: Partner not found
            tags:
