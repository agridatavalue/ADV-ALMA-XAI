openapi: 3.0.3
info:
    title: ADV
    description: "TEST"
    version: 0.0.7
    contact:
        name: "Mirko Colageo"
        email: m.colageo@almaviva.it

paths:
    /build:
        post:
            summary: Build the explainer
            description: Build explainer for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/BuildRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/BuildResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
            tags:
                - Explainer

    /data-distribution:
        post:
            summary: Return the data distribution
            description: Return the data distribution for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/DataDistributionRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/DataDistributionResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - DataCard

    /data-features-and-average-score:
        post:
            summary: Return the data feature and average score of testing data
            description: Return the data feature and average score of testing data
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/DataFeaturesAndAverageScoreRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/DataFeaturesAndAverageScoreResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /individual-conditional-expectations:
        post:
            summary: Return the ICE data
            description: Return the ICE data for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ICERequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ICEResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /heatmap:
        post:
            summary: Return the heatmap data
            description: Return the heatmap data for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/HeatMapRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HeatMapResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /confusion-matrix:
        post:
            summary: Return the confusion matrix data
            description: Return the confusion matrix data for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ConfusionMatrixRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ConfusionMatrixResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /partial-dependence:
        post:
            summary: Return the partial dependence data
            description: Return the partial dependence data for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/PartialDependenceRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PartialDependenceResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /get-explainer-guide:
        get:
            summary: Return the explainer data
            description: Return the explainer data for a given partner
            parameters:
                - name: model
                  in: query
                  required: true
                  description: "the identifier of the model file name"
                  example: "model.pkl"
                  schema:
                      type: string
                - name: prediction_target
                  in: query
                  required: false
                  description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                  example: "Biomass"
                  schema:
                      type: string
                - name: partner
                  in: query
                  required: true
                  description: the identifier of the partner
                  example: "partner1"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ExplainerDataResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
            tags:
                - Explainer

    /feature-importance:
        post:
            summary: Return the feature importance data
            description: Return the feature importance data for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/FeatureImportanceRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/FeatureImportanceResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /feature-descriptions:
        post:
            summary: Return the feature descriptions
            description: Return the feature descriptions for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/FeatureDescriptionRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/FeatureDescriptionResponse"
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /model-performance-metrics:
        post:
            summary: Return the model performance metrics
            description: Return the model performance metrics for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ModelPerformanceMetricsRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ModelPerformanceMetricsResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /model-performance:
        post:
            summary: Return the model performance data
            description: Return the model performance data for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ModelPerformanceRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ModelPerformanceResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - ModelCard

    /{model}/{partner}/ask:
        post:
            summary: Ask something to the explainer
            description: Returns an explaination string
            parameters:
                - name: model
                  in: path
                  required: true
                  description: the identifier of the model file name
                  example: "model.pkl"
                  schema:
                      type: string
                - name: partner
                  in: path
                  required: true
                  description: the identifier of the partner
                  example: "partner1"
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AskRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AskResponse"
                "404":
                    description: Partner / Explainer not found
            tags:
                - AskCard

    /{partner}/feedback:
        get:
            summary: Return the feedback for a given partner
            description: Return the feedback for a given partner
            parameters:
                - name: partner
                  in: path
                  required: true
                  description: the identifier of the partner
                  example: "partner1"
                  schema:
                      type: string
                - name: model
                  in: query
                  required: true
                  description: "the identifier of the model file name"
                  example: "model.pkl"
                  schema:
                      type: string
                - name: prediction_target
                  in: query
                  required: false
                  description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                  example: "Biomass"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PartnerFeedbackResponse"
                "404":
                    description: Partner not found
            tags:
                - Feedback
    /feedback:
        get:
            summary: Return the list of questions based on the metadata provided
            description: Return the list of questions based on the metadata provided
            parameters:
                - name: model
                  in: query
                  required: true
                  description: "the identifier of the model file name"
                  example: "model.pkl"
                  schema:
                      type: string
                - name: partner
                  in: query
                  required: true
                  description: the identifier of the partner
                  example: "partner1"
                  schema:
                      type: string
                - name: prediction_target
                  in: query
                  required: true
                  description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                  example: "Biomass"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/QuestionsResponse"
            tags:
                - Feedback
        post:
            summary: Receive the feedback from the user
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/FeedbackRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/FeedbackResponse"
            tags:
                - Feedback

    /data-source-types:
        get:
            summary: returns the list of data source types
            description: returns the list of data source types
            parameters:
                - name: model
                  in: query
                  required: true
                  description: "the identifier of the model file name"
                  example: "model.pkl"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/DataSourceTypesResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
            tags:
                - DataCard

    /{model}/{partner}/image:
        get:
            summary: Return the image
            description: Return the image for a given partner
            parameters:
                - name: model
                  in: path
                  required: true
                  description: the identifier of the model file name
                  example: "model.pkl"
                  schema:
                      type: string
                - name: partner
                  in: path
                  required: true
                  description: the identifier of the partner
                  example: "partner1"
                  schema:
                      type: string
                - name: filename
                  in: query
                  required: true
                  description: the file name of the image
                  example: "image.png"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        image/png:
                            schema:
                                type: string
                                format: binary
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
            tags:
                - Helpers

tags:
    - name: Explainer
      description: Operations related to the explainer
    - name: DataCard
      description: Endpoints returning data for data card
    - name: ModelCard
      description: Endpoints returning data for model card
    - name: Feedback
      description: Endpoints returning data for feedback handling
    - name: AskCard
      description: Endpoints returning text explainations
    - name: Helpers
      description: Helper endpoints

servers: []
components:
    securitySchemes:
        bearer:
            scheme: bearer
            bearerFormat: Bearer
            description: "Please enter token in following format: Bearer <JWT>"
            type: http
    schemas:
        DataDistributionRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                bin_size:
                    description: intervals that group target data into ranges for visualization
                    example: 50
                    default: 30
                    type: number
            required:
                - model
                - partner
        DataDistributionResponse:
            type: object
            properties:
                x_axis_values:
                    type: array
                    items:
                        type: number
                        format: float
                y_axis_values:
                    type: array
                    items:
                        type: number
                        format: float

        DataFeaturesAndAverageScoreRequest:
            type: object
            properties:
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
            required:
                - model
                - partner
        DataFeaturesAndAverageScoreResponse:
            type: array
            items:
                type: object
                properties:
                    feature:
                        type: string
                    average_score:
                        type: number
                        format: float

        ICERequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                feature:
                    description: the name of the feature to explain
                    example: "NO3-N 0-30 cm start (kg/ha)"
                    type: string
                prediction_target:
                    description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                    example: "Biomass"
                    type: string
            required:
                - model
                - partner
                - feature
        ICEResponse:
            type: object
            properties:
                pdp_mean:
                    type: array
                    items:
                        type: number
                        format: float
                ice_curves:
                    type: array
                    items:
                        type: array
                        items:
                            type: number
                            format: float
                grid_values:
                    type: array
                    items:
                        type: number
                        format: float

        HeatMapRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - model
                - partner
        HeatMapResponse:
            type: object
            properties:
                sources:
                    type: array
                    items:
                        type: string

        ConfusionMatrixRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                prediction_target:
                    description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                    example: "Biomass"
                    type: string
            required:
                - model
                - partner
        ConfusionMatrixResponse:
            type: object
            properties:
                actual:
                    type: object
                    properties:
                        0:
                            type: number
                            format: float
                        1:
                            type: number
                            format: float
                    example: { 0: 0.5, 1: 0.5 }
                predicted:
                    type: object
                    properties:
                        0:
                            type: number
                            format: float
                        1:
                            type: number
                            format: float
                    example: { 0: 0.5, 1: 0.5 }

        PartialDependenceRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                prediction_target:
                    description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                    example: "Biomass"
                    type: string
                feature:
                    description: the name of the feature to explain
                    example: "NO3-N 0-30 cm start (kg/ha)"
                    type: string
            required:
                - model
                - partner
                - feature
                - prediction_target
        PartialDependenceResponse:
            type: object
            properties:
                std_effect:
                    type: number
                    format: float
                mean_effect:
                    type: number
                    format: float
                feature_values:
                    type: array
                    items:
                        type: number
                        format: float
                pdp_values:
                    type: array
                    items:
                        type: number
                        format: float
                lower_bound:
                    type: array
                    items:
                        type: number
                        format: float
                upper_bound:
                    type: array
                    items:
                        type: number
                        format: float

        ExplainerDataResponse:
            type: object
            properties:
                endpoints:
                    type: array
                    items:
                        type: object
                        properties:
                            name:
                                type: string
                            url:
                                type: string
        DataSourceTypesResponse:
            type: object
            properties:
                sources:
                    type: array
                    items:
                        type: object
                        properties:
                            type:
                                type: string
                            value:
                                type: number
            example: '{sources: [{type:"agronomic", value:3}]}'

        QuestionsResponse:
            type: object
            properties:
                questions:
                    type: array
                    items:
                        type: object
                        properties:
                            id:
                                type: string
                            question:
                                type: string
                            answers:
                                type: object
                                properties:
                                    type:
                                        type: string
                                        enum:
                                            - radio
                                            - string
                                    values:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                label:
                                                    type: string
                                                value:
                                                    type: string
        PartnerFeedbackResponse:
            type: object
            properties:
                creation_date:
                    type: string
                    format: date-time
                feedback:
                    type: array
                    items:
                        type: object
                        properties:
                            id:
                                type: string
                            question:
                                type: string
                            answers:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        type:
                                            type: string
                                            enum:
                                                - radio
                                                - string
                                        label:
                                            type: string
                                        value:
                                            type: string
        FeedbackRequest:
            type: object
            properties:
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                prediction_target:
                    description: the name of the field target to explain the model
                    example: "Biomass"
                    type: string
                responses:
                    type: array
                    items:
                        type: object
                        properties:
                            id:
                                type: string
                            text:
                                type: string
                            answer:
                                type: string
            required:
                - partner
                - model
                - responses
                - prediction_target
        FeedbackResponse:
            type: object
            properties:
                status:
                    type: string

        FeatureImportanceRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                prediction_target:
                    description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                    example: "Biomass"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - model
                - partner
        FeatureImportanceResponse:
            type: object
            properties:
                features:
                    type: array
                    items:
                        type: string
                importance:
                    type: string
                values:
                    type: array
                    items:
                        type: number
                        format: float

        FeatureDescriptionRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
            required:
                - model
        FeatureDescriptionResponse:
            type: array
            items:
                type: object
                properties:
                    feature:
                        type: string
                    description:
                        type: string
            example:
                - feature: "Row distance (cm)"
                  description: "Distance between plantation rows in cm"
                - feature: "NO3-N 0-30 cm start (kg/ha)"
                  description: "Nitrate content in the soil at 0-30 cm depth at the start of the season"

        ModelPerformanceMetricsRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                prediction_target:
                    description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                    example: "Biomass"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - model
                - partner
        ModelPerformanceMetricsResponse:
            type: array
            items:
                type: object
                properties:
                    key:
                        type: string
                    value:
                        type: number
                        format: float

        ModelPerformanceRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                prediction_target:
                    description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                    example: "Biomass"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - data
                - model
                - partner
        ModelPerformanceResponse:
            type: object
            properties:
                target:
                    type: string
                actual:
                    type: array
                    items:
                        type: number
                        format: float
                predictions:
                    type: array
                    items:
                        type: number
                        format: float

        BuildRequest:
            type: object
            properties:
                model:
                    description: path for the ML model file
                    example: "model.pkl"
                    type: string
                meta_data:
                    description: path for the metadata file
                    example: "metadata.json"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                data:
                    description: optional
                    type: string
                prediction_targets:
                    description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                    example: ["Biomass"]
                    type: array
                    items:
                        type: string
            required:
                - data
                - model
                - partner
                - meta_data
        BuildResponse:
            type: object
            properties:
                status:
                    type: string
                explainers:
                    type: array
                    items:
                        type: object
                        properties:
                            name:
                                description: the filename of the created explainer
                                type: string
                                example: ale.pkl

        AskRequest:
            type: object
            properties:
                request:
                    description: request to ask to the explainer
                    example: ""
                    type: string
            required:
                - request
        AskResponse:
            type: object
            properties:
                response:
                    type: string
