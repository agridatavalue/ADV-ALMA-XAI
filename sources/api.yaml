openapi: 3.0.3
info:
    title: ADV
    description: "ADV XAI Fulfilment API"
    version: 0.1.0
    contact:
        name: "Mirko Colageo"
        email: m.colageo@almaviva.it

paths:
    /build:
        post:
            summary: Build the explainer
            description: Build explainer for a given partner
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/BuildRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/BuildResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
            tags:
                - Explainer

    /{model}/{partner}/get-summary/{language}:
        get:
            summary: Return the summary explanation text
            description: Return the summary explanation text for a given partner's model
            parameters:
                - name: model
                  in: path
                  required: true
                  description: the identifier of the model file name
                  example: "model.pkl"
                  schema:
                      type: string
                - name: partner
                  in: path
                  required: true
                  description: the identifier of the partner
                  example: "partner1"
                  schema:
                      type: string
                - name: language
                  in: path
                  required: true
                  description: the language code for the summary text
                  example: "en"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SummaryResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
                "500":
                    description: Internal server error
            tags:
                - Explainer

    /feature-impact:
        post:
