openapi: 3.0.3
info:
    title: ADV
    description: "TEST"
    version: 0.0.1
    contact:
        name: "Mirko Colageo"
        email: m.colageo@almaviva.it

paths:
    /build:
        post:
            summary: Build the explainer
            description: Build explainer for a given pilot
            operationId: build
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/BuildRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/BuildResponse"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/BuildResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Pilot / Model not found
            tags:
                - Build
    /feature-importance:
        post:
            summary: Return the feature importance data
            description: Return the feature importance data for a given pilot
            operationId: featureImportance
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/FeatureImportanceRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/FeatureImportanceResponse"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/FeatureImportanceResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Pilot / Model not found
                "500":
                    description: Internal server error
            tags:
                - featureImportance

    /feature-descriptions:
        post:
            summary: Return the feature descriptions
            description: Return the feature descriptions for a given pilot
            operationId: featureDescriptions
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/FeatureDescriptionRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/FeatureDescriptionResponse"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/FeatureDescriptionResponse"
                "404":
                    description: Pilot / Model not found
                "500":
                    description: Internal server error
            tags:
                - featureDescriptions

    /model-performance-metric:
        post:
            summary: Return the model performance metric
            description: Return the model performance metric for a given pilot
            operationId: modelPerformanceMetric
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ModelPerformanceMetricRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ModelPerformanceMetricResponse"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ModelPerformanceMetricResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Pilot / Model not found
                "500":
                    description: Internal server error
            tags:
                - modelPerformanceMetric

    /model-performance:
        post:
            summary: Return the model performance data
            description: Return the model performance data for a given pilot
            operationId: modelPerformance
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ModelPerformanceRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ModelPerformanceResponse"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ModelPerformanceResponse"
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Pilot / Model not found
                "500":
                    description: Internal server error
            tags:
                - modelPerformance

    /ask:
        post:
            summary: Ask something to the explainer
            description: Returns an explaination string
            operationId: ask
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AskRequest"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AskResponse"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AskResponse"
                "404":
                    description: Pilot / Explainer not found
            tags:
                - Ask
tags: []
servers: []
components:
    securitySchemes:
        bearer:
            scheme: bearer
            bearerFormat: Bearer
            description: "Please enter token in following format: Bearer <JWT>"
            type: http
    schemas:
        FeatureImportanceRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                meta_data:
                    description: the identifier of the metadata file name
                    example: "metadata.json"
                    type: string
            required:
                - model
        FeatureImportanceResponse:
            type: object
            properties:
                data:
                    type: string

        FeatureDescriptionRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                meta_data:
                    description: the identifier of the metadata file name
                    example: "metadata.json"
                    type: string
            required:
                - model
        FeatureDescriptionResponse:
            type: array
            items:
                type: object
                properties:
                    feature:
                        type: string
                    description:
                        type: string

        ModelPerformanceMetricRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
            required:
                - model
        ModelPerformanceMetricResponse:
            type: array
            items:
                type: object
                properties:
                    key:
                        type: string
                    value:
                        type: string

        ModelPerformanceRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
            required:
                - model
        ModelPerformanceResponse:
            type: object
            properties:
                data:
                    type: string

        BuildRequest:
            type: object
            properties:
                model:
                    description: path for the ML model file
                    example: "model.pkl"
                    type: string
                metadata:
                    description: path for the metadata file
                    example: "metadata.json"
                    type: string
                pilot:
                    description: the identifier of the pilot
                    example: "pilot8"
                    type: string
                data:
                    description: optional
                    type: string
            required:
                - model
                - metadata
                - pilot
        BuildResponse:
            type: object
            properties:
                status:
                    type: string

        AskRequest:
            type: object
            properties:
                request:
                    description: request to ask to the explainer
                    example: ""
                    type: string
                explainer:
                    description: explainer name
                    example: "ALE"
                    type: string
                pilot:
                    description: the identifier of the pilot
                    example: "pilot8"
                    type: string
            required:
                - pilot
                - request
                - explainer
        AskResponse:
            type: object
            properties:
                response:
                    type: string
