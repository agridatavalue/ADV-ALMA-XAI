            description: Return the image for a given partner
            parameters:
                - name: model
                  in: path
                  required: true
                  description: the identifier of the model file name
                  example: "model.pkl"
                  schema:
                      type: string
                - name: partner
                  in: path
                  required: true
                  description: the identifier of the partner
                  example: "partner1"
                  schema:
                      type: string
                - name: filename
                  in: query
                  required: true
                  description: the file name of the image
                  example: "image.png"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        image/png:
                            schema:
                                type: string
                                format: binary
                "400":
                    description: Invalid IDs combination supplied
                "404":
                    description: Partner / Model not found
            tags:
                - Helpers

    /kpi/feedback/{model}:
        get:
            summary: Return the feedback KPI for a given model
            description: Return the feedback KPI for a given model
            parameters:
                - name: model
                  in: path
                  required: true
                  description: the identifier of the model file name
                  example: "model.pkl"
                  schema:
                      type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    model_name:
                                        type: string
                                    num_of_feedback:
                                        type: number
                                        format: integer
                                    num_of_positive_feedback:
                                        type: number
                                        format: integer
                                    percentage_positive_feedback:
                                        type: number
                                        format: float
                                example:
                                    model_name: "logisticRegressionOliveFruitflyRiskOfInfestation.pkl"
                                    num_of_feedback: 10
                                    num_of_positive_feedback: 8
                                    percentage_positive_feedback: 80
                "404":
                    description: Model not found
            tags:
                - KPI
tags:
    - name: Explainer
      description: Operations related to the explainer
    - name: DataCard
      description: Endpoints returning data for data card
    - name: ModelCard
      description: Endpoints returning data for model card
    - name: Feedback
      description: Endpoints returning data for feedback handling
    - name: KPI
      description: Endpoints returning data for KPIs
    - name: Helpers
      description: Helper endpoints

servers: []
components:
    securitySchemes:
        bearer:
            scheme: bearer
            bearerFormat: Bearer
            description: "Please enter token in following format: Bearer <JWT>"
            type: http
    schemas:
        SummaryResponse:
            type: object
            properties:
                summary_text:
                    type: string
            example:
                summary_text: "This model predicts the likelihood of anomaly in the dataset based on various features. The model has been trained on historical data and validated for accuracy."

        AnomalyVsNormalRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - model
                - partner
        AnomalyVsNormalResponse:
            type: object
            properties:
                normal_count:
                    type: number
                    format: integer
                anomaly_count:
                    type: number
                    format: integer
            example:
                normal_count: 950
                anomaly_count: 50

        FeatureImpactRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                feature:
                    description: the name of the feature to explain
                    example: "NO3-N 0-30 cm start (kg/ha)"
                    type: string
            required:
                - model
                - partner
        FeatureImpactResponse:
            type: object
            properties:
                features:
                    type: array
                    items:
                        type: object
                        properties:
                            name:
                                type: string
                            data:
                                type: array
                                items:
                                    type: number
                                    format: float

        AnomalyScoreRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
        AnomalyScoreResponse:
            type: array
            items:
                type: object
                properties:
                    scores:
                        type: number
                        format: float
            example:
                - Activity: 155
                  Calving: 0
                  Date: "Mon, 17 Mar 2025 00:00:00 GMT"
                  Day: 384
                  scores: 0.23525170320321792
                - Activity: 101
                  Calving: 0
                  Date: "Tue, 18 Mar 2025 00:00:00 GMT"
                  Day: 385
                  scores: 0.14790427617840052

        LiftCurveRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - model
                - partner
        LiftCurveResponse:
            type: object
            properties:
                lift_curve_data:
                    type: array
                    items:
                        type: number
                        format: float
                cumulative_positives_model:
                    type: array
                    items:
                        type: number
                        format: float
                cumulative_positives_random:
                    type: array
                    items:
                        type: number
                        format: float

        ClassificationClassLabelSizesRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - model
                - partner
        ClassificationClassLabelSizesResponse:
            type: object
            properties:
                above_cutoff:
                    type: object
                    properties:
                        class_label_0:
                            type: number
                            format: float
                        class_label_1:
                            type: number
                            format: float
                    example: { "class_label_0": 0.5, "class_label_1": 0.5 }
                below_cutoff:
                    type: object
                    properties:
                        class_label_0:
                            type: number
                            format: float
                        class_label_1:
                            type: number
                            format: float
                    example: { "class_label_0": 0.5, "class_label_1": 0.5 }
                total:
                    type: object
                    properties:
                        class_label_0:
                            type: number
                            format: float
                        class_label_1:
                            type: number
                            format: float
                    example: { "class_label_0": 0.5, "class_label_1": 0.5 }

        TargetsRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - model
                - partner
        TargetsResponse:
            type: object
            properties:
                y_real:
                    type: array
                    items:
                        type: number
                        format: float
                x_real:
                    type: array
                    items:
                        type: number
                        format: float
                y_predicted:
                    type: array
                    items:
                        type: number
                        format: float

        DataDistributionRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                bin_size:
                    description: intervals that group target data into ranges for visualization
                    example: 50
                    default: 30
                    type: number
            required:
                - model
                - partner
        DataDistributionResponse:
            type: object
            properties:
                x_axis_values:
                    type: array
                    items:
                        type: number
                        format: float
                y_axis_values:
                    type: array
                    items:
                        type: number
                        format: float

        DataFeaturesAndAverageScoreRequest:
            type: object
            properties:
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
            required:
                - model
                - partner
        DataFeaturesAndAverageScoreResponse:
            type: array
            items:
                type: object
                properties:
                    feature:
                        type: string
                    average_score:
                        type: number
                        format: float

        ICERequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
                feature:
                    description: the name of the feature to explain
                    example: "NO3-N 0-30 cm start (kg/ha)"
                    type: string
                prediction_target:
                    description: the name of the field target to explain the model, in case of null value it will be used the first target described in meta_data
                    example: "Biomass"
                    type: string
            required:
                - model
                - partner
                - feature
        ICEResponse:
            type: object
            properties:
                pdp_mean:
                    type: array
                    items:
                        type: number
                        format: float
                ice_curves:
                    type: array
                    items:
                        type: array
                        items:
                            type: number
                            format: float
                grid_values:
                    type: array
                    items:
                        type: number
                        format: float

        HeatMapRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
                    type: string
                partner:
                    description: the identifier of the partner
                    example: "partner1"
                    type: string
            required:
                - model
                - partner
        HeatMapResponse:
            type: object
            properties:
                sources:
                    type: array
                    items:
                        type: string

        ConfusionMatrixRequest:
            type: object
            properties:
                model:
                    description: the identifier of the model file name
                    example: "model.pkl"
