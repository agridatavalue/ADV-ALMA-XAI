apiVersion: apps/v1
kind: Deployment
metadata:
    name: xai-fulfillment
    namespace: agridatavalue
spec:
    replicas: 1
    selector:
        matchLabels:
            app: xai-fulfillment
    template:
        metadata:
            labels:
                app: xai-fulfillment
        spec:
            imagePullSecrets:
                - name: agridatavalue-regcred
            containers:
                - name: xai-fulfillment
                  image: registry.git.agridatavalue.eu/agridatavalue/platform-integration/xai-fulfilment:REGISTRY_IMAGE_TAG
                  ports:
                      - containerPort: 8000
                        protocol: TCP
                        name: http
                  env:
                      - name: MINIO_ENDPOINT
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: MINIO_ENDPOINT
                      - name: MINIO_ACCESS_KEY
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: MINIO_PUBLIC_KEY
                      - name: MINIO_SECRET_KEY
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: MINIO_SECRET_KEY

                     - name: DATA_FOLDER_PATH
                       value: "datagen"
                     - name: MODEL_FOLDER_PATH
                       value: "models"
                     - name: EXPLAINER_FOLDER_PATH
                       value: "explanators"
                     - name: SERVER_PORT
                       value: "8505"
