apiVersion: apps/v1
kind: Deployment
metadata:
    name: xai-fulfillment-deployment
    namespace: agridatavalue
spec:
    replicas: 1
    selector:
        matchLabels:
            app: xai-fulfillment
    template:
        metadata:
            labels:
                app: xai-fulfillment
        spec:
            containers:
                - name: xai-fulfillment
                  image: registry.git.agridatavalue.eu/agridatavalue/platform-integration/xai-fulfillment:<version>
                  ports:
                      - containerPort: 8000
                        protocol: TCP
                        name: http
                  env:
                      - name: SECURE_STORE_ENDPOINT
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: SECURE_STORE_ENDPOINT
                      - name: SECURE_STORE_ACCESS_KEY
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: SECURE_STORE_ACCESS_KEY
                      - name: SECURE_STORE_SECRET_KEY
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: SECURE_STORE_SECRET_KEY
                      - name: STORE_ENDPOINT
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: STORE_ENDPOINT
                      - name: STORE_ACCESS_KEY
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: STORE_ACCESS_KEY
                      - name: STORE_SECRET_KEY
                        valueFrom:
                            secretKeyRef:
                                name: minio-keys-secret
                                key: STORE_SECRET_KEY
                      - name: DATA_FOLDER_PATH
                        value: "agridatavalue"
                      - name: SERVER_THREADS
                        value: "2"
                      - name: MODEL_FOLDER_PATH
                        value: "agridatavalue"
                      - name: EXPLAINER_FOLDER_PATH
                        value: "agridatavalue"
                      - name: SERVER_PORT
                        value: "8505"
                      - name: TEMP
                        value: "/app/data_temp"
