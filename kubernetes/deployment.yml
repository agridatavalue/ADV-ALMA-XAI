apiVersion: apps/v1
kind: Deployment
metadata:
  name: xai-fulfillment-deployment
  namespace: agridatavalue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xai-fulfillment
  template:
    metadata:
      labels:
        app: xai-fulfillment
    spec:
      containers:
      - name: xai-fulfillment
        image: registry.git.agridatavalue.eu/agridatavalue/platform-integration/xai-fulfillment:<version>
        ports:
        - containerPort: 8000
          protocol: TCP
          name: http
        env:
        - name: MINIO_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: minio-keys-secret
              key: MINIO_ENDPOINT
        - name: MINIO_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: minio-keys-secret
              key: MINIO_PUBLIC_KEY
        - name: MINIO_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: minio-keys-secret
              key: MINIO_PRIVATE_KEY



