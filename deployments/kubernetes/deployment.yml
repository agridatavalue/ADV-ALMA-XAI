apiVersion: apps/v1
kind: Deployment
metadata:
  name: xai-fulfillment
  namespace: agridatavalue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xai-fulfillment
  template:
    metadata:
      labels:
        app: xai-fulfillment
    spec:
      imagePullSecrets:
      - name: agridatavalue-regcred
      containers:
      - name: xai-fulfillment
        image: registry.git.agridatavalue.eu/agridatavalue/platform-integration/xai-fulfilment:REGISTRY_IMAGE_TAG
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          protocol: TCP
          name: http
        envFrom:
          - configMapRef:
              name: xai-fulfillment
          - secretRef:
              name: xai-fulfillment
