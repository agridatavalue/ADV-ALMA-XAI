apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ include "xai-fulfillment.fullname" . }}
    namespace: {{ .Release.Namespace }}
data:
    DATA_FOLDER_PATH: "agridatavalue/ai_flows"
    MODEL_FOLDER_PATH: "agridatavalue/ai_flows"
    EXPLAINER_FOLDER_PATH: "agridatavalue/ai_flows"
