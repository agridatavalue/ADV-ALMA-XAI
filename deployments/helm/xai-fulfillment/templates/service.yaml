apiVersion: v1
kind: Service
metadata:
  name: {{ include "xai-fulfillment.fullname" . }}
  labels:
    {{- include "xai-fulfillment.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: xai-http
      protocol: TCP
      name: xai-http
  selector:
    {{- include "xai-fulfillment.selectorLabels" . | nindent 4 }}
